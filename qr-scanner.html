<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 코드 스캔 - HVAC 관리</title>
    <!-- PWA Meta Tags -->
    <meta name="description" content="공조설비 점검 및 관리 시스템">
    <meta name="theme-color" content="#667eea">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/svg+xml" href="icons/icon-192x192.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        .scanner-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 공통 카드 스타일 */
        .info-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* QR 카메라 섹션 */
        .camera-section {
            text-align: center;
        }
        
        #reader {
            border: 3px solid #667eea;
            border-radius: 15px;
            overflow: hidden;
            margin: 0 auto;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
            background: white;
        }
        
        /* 카메라가 작동 중일 때 */
        #reader.active {
            border-color: #28a745;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }
        
        /* 카메라 사용 불가 시 메시지 */
        #reader video {
            display: block;
            width: 100%;
        }
        
        .scanner-info {
            background: linear-gradient(135deg, #e3f2fd 0%, #e8eaf6 100%);
            border-left: 4px solid #667eea;
            text-align: left;
        }
        
        .scanner-info strong {
            color: #667eea;
            font-size: 16px;
        }
        
        .scanner-result {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-left: 4px solid #28a745;
            display: none;
            text-align: center;
        }
        
        .scanner-error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border-left: 4px solid #dc3545;
            display: none;
            text-align: left;
        }
        .equipment-preview {
            border: 2px solid #667eea;
            display: none;
        }
        .equipment-preview h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .equipment-info {
            text-align: left;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .equipment-info i {
            color: #667eea;
            width: 24px;
            margin-right: 10px;
        }
        .btn-start-inspection {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            flex: 1;
            min-width: 0;
        }
        .btn-start-inspection:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-history {
            background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            flex: 1;
            min-width: 0;
        }
        .btn-history:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        .scan-again {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
            flex: 1;
            min-width: 0;
        }
        .scan-again:hover {
            background: linear-gradient(135deg, #5a6268 0%, #343a40 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        
        /* 버튼 컨테이너 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        /* 수동 입력 섹션 */
        .manual-input-section {
            background: linear-gradient(135deg, #fff9e6 0%, #fffbf0 100%);
            border-left: 4px solid #ffc107;
        }
        
        .manual-input-section .section-title {
            margin-bottom: 15px;
        }
        
        .manual-input-section .section-title i {
            color: #ffc107;
            font-size: 20px;
            margin-right: 8px;
        }
        
        .manual-input-section .section-title strong {
            color: #856404;
            font-size: 16px;
        }
        
        .manual-input-section input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .manual-input-section .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .manual-input-section .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .manual-input-section .btn-secondary {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(118, 75, 162, 0.3);
        }
        
        .manual-input-section .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
        }
        
        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
            }
            
            .btn-start-inspection,
            .btn-history,
            .scan-again {
                width: 100%;
                padding: 14px 20px;
                font-size: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .btn-start-inspection,
            .btn-history,
            .scan-again {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
        <button class="btn-back" onclick="location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1><i class="fas fa-qrcode"></i> QR 코드 스캔</h1>
        </div>

        <!-- 모든 컨텐츠를 scanner-container로 통일 -->
        <div class="scanner-container">
            <!-- QR 카메라 섹션 -->
            <div class="info-card camera-section">
                <div id="reader"></div>
            </div>

            <!-- 스캔 결과 -->
            <div id="scannerResult" class="info-card scanner-result">
                <i class="fas fa-check-circle"></i>
                <strong>QR 코드 인식 성공!</strong>
            </div>

            <!-- 오류 메시지 -->
            <div id="scannerError" class="info-card scanner-error">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>오류 발생</strong><br>
                <span id="errorMessage"></span>
            </div>

            <!-- 스캔된 장비 정보 -->
            <div id="equipmentPreview" class="info-card equipment-preview">
                <h3><i class="fas fa-wrench"></i> 스캔된 장비 정보</h3>
                <div id="equipmentInfo"></div>
                
                <!-- 액션 버튼 -->
                <div class="action-buttons">
                    <button class="btn-start-inspection" onclick="startInspection()">
                        <i class="fas fa-clipboard-check"></i> 점검 시작하기
                    </button>
                    <button class="btn-history" onclick="goToHistory()">
                        <i class="fas fa-history"></i> 정비내역
                    </button>
                    <button class="scan-again" onclick="resetScanner()">
                        <i class="fas fa-redo"></i> 다시 스캔
                    </button>
                </div>
            </div>

            <!-- 안내 메시지 -->
            <div class="info-card scanner-info">
                <i class="fas fa-info-circle"></i>
                <strong>QR 코드를 카메라에 비춰주세요</strong><br>
                장비에 부착된 QR 코드를 스캔하면 자동으로 점검 페이지로 이동합니다.<br>
                <small style="color: #666; margin-top: 10px; display: block;">
                    ⚠️ HTTP 환경에서는 카메라를 사용할 수 없습니다. HTTPS(GitHub Pages)에서 사용하거나, 아래 수동 입력을 이용하세요.
                </small>
            </div>

            <!-- 수동 입력 섹션 -->
            <div class="info-card manual-input-section">
                <div class="section-title">
                    <i class="fas fa-keyboard"></i>
                    <strong>장비 ID 수동 입력</strong>
                </div>
                <input type="text" id="manualEquipmentId" placeholder="장비 ID 입력 (예: EQ0001)">
                <button class="btn-primary" onclick="loadEquipmentManually()">
                    <i class="fas fa-search"></i> 장비 찾기
                </button>
                <button class="btn-secondary" onclick="location.href='qr-generator.html'">
                    <i class="fas fa-qrcode"></i> QR 코드 생성
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
                const firebaseConfig = {
            apiKey: "AIzaSyCpTEePTOkEfSLRzyszq0dCCJmQEWJsBic",
            authDomain: "hvac-management-477fb.firebaseapp.com",
            projectId: "hvac-management-477fb",
            storageBucket: "hvac-management-477fb.firebasestorage.app",
            messagingSenderId: "312239966797",
            appId: "1:312239966797:web:b454d99fde9823207dea04",
            measurementId: "G-FT4YE5FDP1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // 전역 변수로 노출
        window.db = db;
        window.auth = auth;
        window.firebaseReady = true;
        
        console.log('✅ Firebase 초기화 완료');
    </script>

    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <!-- Auth 관련 스크립트 -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-manager.js"></script>
    <script src="js/mobile-utils.js"></script>
    <script src="js/main.js"></script>
    <script>
        let html5QrCode;
        let scannedEquipmentId = null;
        let scannedEquipment = null;

        // Firebase 초기화 대기
        async function waitForFirebase() {
            return new Promise((resolve) => {
                if (window.db && window.FirestoreHelper) {
                    resolve();
                } else {
                    const checkInterval = setInterval(() => {
                        if (window.db && window.FirestoreHelper) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);
                    
                    // 10초 타임아웃
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        console.error('❌ Firebase 초기화 타임아웃');
                        resolve();
                    }, 10000);
                }
            });
        }
        
        // AuthManager 초기화 대기
        async function waitForAuth() {
            return new Promise((resolve) => {
                const checkInterval = setInterval(async () => {
                    if (window.AuthManager) {
                        clearInterval(checkInterval);
                        await window.AuthManager.initialize();
                        console.log('✅ AuthManager 초기화 완료');
                        resolve();
                    }
                }, 100);
                
                // 10초 타임아웃
                setTimeout(() => {
                    clearInterval(checkInterval);
                    console.error('❌ AuthManager 초기화 타임아웃');
                    resolve();
                }, 10000);
            });
        }

        // 페이지 로드 시 스캐너 시작
        document.addEventListener('DOMContentLoaded', async function() {
            await waitForFirebase();
            console.log('✅ Firebase 준비 완료');
            
            // 로그인 확인
            await waitForAuth();
            const currentUser = window.AuthManager?.getCurrentUser();
            if (!currentUser) {
                console.error('❌ 로그인되지 않은 사용자');
                alert('로그인이 필요합니다.');
                window.location.href = 'login.html';
                return;
            }
            console.log('✅ 로그인 확인:', currentUser.email, '역할:', currentUser.role);
            
            // 환경 확인
            const isHTTPS = window.location.protocol === 'https:';
            console.log(`📍 프로토콜: ${window.location.protocol} (HTTPS: ${isHTTPS})`);
            
            // HTTPS 환경이거나 localhost인 경우에만 카메라 시도
            if (isHTTPS || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                console.log('✅ 카메라 접근 가능 환경, 스캐너 시작...');
                startScanner();
            } else {
                console.warn('⚠️ HTTP 환경: 카메라 접근 불가');
                showHTTPWarning();
            }
        });

        function showHTTPWarning() {
            const readerDiv = document.getElementById('reader');
            readerDiv.innerHTML = `
                <div style="background: #fff3cd; padding: 30px; border-radius: 8px; color: #856404; text-align: left;">
                    <h3 style="color: #ff9800; margin-top: 0;">
                        <i class="fas fa-exclamation-triangle"></i> 카메라 기능 사용 불가
                    </h3>
                    <p><strong>현재 HTTP 환경에서는 브라우저 보안 정책으로 카메라를 사용할 수 없습니다.</strong></p>
                    
                    <h4 style="color: #667eea; margin-top: 20px;">✅ 해결 방법:</h4>
                    <ol style="line-height: 1.8;">
                        <li><strong>GitHub Pages에서 접속하기</strong> (추천!)<br>
                            <a href="https://noyorc.github.io/hvac-management/qr-scanner.html" 
                               style="color: #667eea; text-decoration: underline;" 
                               target="_blank">
                                👉 https://noyorc.github.io/hvac-management/qr-scanner.html
                            </a>
                        </li>
                        <li><strong>위의 수동 입력 사용하기</strong><br>
                            장비 ID(예: EQ001)를 직접 입력하여 검색할 수 있습니다.
                        </li>
                    </ol>
                    
                    <div style="background: #e3f2fd; padding: 15px; border-radius: 5px; margin-top: 20px;">
                        <strong>💡 참고:</strong> HTTPS 환경에서는 카메라로 QR 코드를 직접 스캔할 수 있습니다!
                    </div>
                </div>
            `;
        }

        function startScanner() {
            console.log('🎥 QR 스캐너 초기화 중...');
            
            // Html5Qrcode가 로드되었는지 확인
            if (typeof Html5Qrcode === 'undefined') {
                console.error('❌ Html5Qrcode 라이브러리가 로드되지 않았습니다.');
                showLibraryError();
                return;
            }
            
            try {
                html5QrCode = new Html5Qrcode("reader");
                console.log('✅ Html5Qrcode 인스턴스 생성 완료');
            } catch (err) {
                console.error('❌ Html5Qrcode 인스턴스 생성 실패:', err);
                showLibraryError();
                return;
            }
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                disableFlip: false
            };

            console.log('📷 카메라 시작 시도...');
            
            html5QrCode.start(
                { facingMode: "environment" }, // 후면 카메라 사용
                config,
                onScanSuccess,
                onScanFailure
            ).then(() => {
                console.log('✅ QR 스캐너 시작 성공!');
                document.getElementById('reader').classList.add('active');
            }).catch(err => {
                console.error("❌ 스캐너 시작 오류:", err);
                showCameraError(err);
            });
        }

        function showLibraryError() {
            const readerDiv = document.getElementById('reader');
            readerDiv.innerHTML = `
                <div style="background: #f8d7da; padding: 20px; border-radius: 8px; color: #721c24;">
                    <strong>⚠️ QR 스캐너 라이브러리 로드 실패</strong><br><br>
                    <p>페이지를 새로고침(Ctrl + Shift + R)해주세요.</p>
                    <button onclick="location.reload()" 
                        style="background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">
                        <i class="fas fa-redo"></i> 새로고침
                    </button>
                </div>
            `;
        }

        function showCameraError(err) {
            const readerDiv = document.getElementById('reader');
            let errorMsg = err.toString();
            let solutions = [];
            
            if (errorMsg.includes('NotAllowedError') || errorMsg.includes('Permission denied')) {
                solutions.push('브라우저 주소창의 카메라 아이콘을 클릭하여 권한을 허용해주세요.');
                solutions.push('브라우저 설정에서 카메라 권한을 확인해주세요.');
            } else if (errorMsg.includes('NotFoundError')) {
                solutions.push('카메라가 연결되어 있는지 확인해주세요.');
                solutions.push('다른 앱이 카메라를 사용 중인지 확인해주세요.');
            } else if (errorMsg.includes('NotReadableError')) {
                solutions.push('다른 앱/탭에서 카메라를 사용 중일 수 있습니다. 닫고 다시 시도해주세요.');
            } else if (errorMsg.includes('OverconstrainedError')) {
                solutions.push('요청한 카메라 설정을 지원하지 않습니다.');
            } else if (errorMsg.includes('NotSupportedError') || errorMsg.includes('TypeError')) {
                solutions.push('HTTP 환경에서는 카메라를 사용할 수 없습니다.');
                solutions.push('GitHub Pages(HTTPS)에서 접속해주세요.');
            }
            
            if (solutions.length === 0) {
                solutions.push('위의 수동 입력을 사용해주세요.');
                solutions.push('GitHub Pages(HTTPS)에서 접속해주세요: https://noyorc.github.io/hvac-management/qr-scanner.html');
            }
            
            readerDiv.innerHTML = `
                <div style="background: #f8d7da; padding: 20px; border-radius: 8px; color: #721c24; text-align: left;">
                    <h4 style="margin-top: 0;"><i class="fas fa-exclamation-triangle"></i> 카메라를 사용할 수 없습니다</h4>
                    
                    <p><strong>오류:</strong> ${errorMsg}</p>
                    
                    <p><strong>해결 방법:</strong></p>
                    <ul>
                        ${solutions.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                    
                    <div style="background: #d1ecf1; padding: 15px; border-radius: 5px; margin-top: 15px; color: #0c5460;">
                        <strong>💡 대안:</strong> 위의 <strong>수동 입력</strong>을 사용하면 카메라 없이도 장비를 검색할 수 있습니다!
                    </div>
                    
                    <button onclick="location.reload()" 
                        style="background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%;">
                        <i class="fas fa-redo"></i> 다시 시도하기
                    </button>
                </div>
            `;
        }

        async function onScanSuccess(decodedText, decodedResult) {
            console.log(`QR 코드 스캔 성공: ${decodedText}`);
            
            // 스캐너 중지
            html5QrCode.stop().then(() => {
                console.log("스캐너 중지됨");
            }).catch(err => {
                console.error("스캐너 중지 오류:", err);
            });

            // 결과 표시
            document.getElementById('scannerResult').style.display = 'block';
            
            // 장비 정보 조회
            await loadEquipmentInfo(decodedText);
        }

        function onScanFailure(error) {
            // 스캔 실패는 계속 시도하므로 로그만 출력
            // console.warn(`QR 스캔 실패: ${error}`);
        }

        async function loadEquipmentInfo(equipmentId) {
            try {
                // Firebase에서 장비 정보 조회
                const result = await window.FirestoreHelper.getDocument('equipment', equipmentId);
                
                if (result.success && result.data) {
                    scannedEquipment = result.data;
                    scannedEquipmentId = equipmentId;
                    
                    // 장비 정보 표시
                    const equipmentInfo = document.getElementById('equipmentInfo');
                    equipmentInfo.innerHTML = `
                        <div class="equipment-info">
                            <i class="fas fa-tag"></i>
                            <strong>장비 ID:</strong> ${scannedEquipment.id}
                        </div>
                        <div class="equipment-info">
                            <i class="fas fa-wrench"></i>
                            <strong>장비 종류:</strong> ${scannedEquipment.equipment_type}
                        </div>
                        <div class="equipment-info">
                            <i class="fas fa-box"></i>
                            <strong>모델:</strong> ${scannedEquipment.model}
                        </div>
                        <div class="equipment-info">
                            <i class="fas fa-map-marker-alt"></i>
                            <strong>위치:</strong> ${scannedEquipment.floor} - ${scannedEquipment.location}
                        </div>
                        <div class="equipment-info">
                            <i class="fas fa-tachometer-alt"></i>
                            <strong>용량:</strong> ${scannedEquipment.capacity}
                        </div>
                    `;
                    
                    document.getElementById('equipmentPreview').style.display = 'block';
                    document.getElementById('scannerResult').style.display = 'block';
                } else {
                    showError(`장비를 찾을 수 없습니다. (ID: ${equipmentId})`);
                }
            } catch (error) {
                console.error('장비 정보 조회 오류:', error);
                showError('장비 정보를 불러오는데 실패했습니다.');
            }
        }

        // 수동 입력으로 장비 검색
        async function loadEquipmentManually() {
            const equipmentId = document.getElementById('manualEquipmentId').value.trim();
            
            if (!equipmentId) {
                alert('장비 ID를 입력해주세요.');
                return;
            }
            
            // 스캐너 중지 (실행 중이면)
            if (html5QrCode && html5QrCode.isScanning) {
                try {
                    await html5QrCode.stop();
                } catch (err) {
                    console.log('스캐너 중지:', err);
                }
            }
            
            // 장비 정보 로드
            await loadEquipmentInfo(equipmentId);
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('scannerError').style.display = 'block';
            
            // 5초 후 다시 스캔
            setTimeout(() => {
                resetScanner();
            }, 5000);
        }

        function startInspection() {
            // 권한 체크 (ADMIN은 점검 불가)
            const user = window.AuthManager?.getCurrentUser();
            if (user && user.role === window.USER_ROLES?.ADMIN) {
                alert('관리자는 점검을 수행할 수 없습니다.\n점검자(INSPECTOR) 또는 매니저(MANAGER) 계정을 사용해주세요.');
                return;
            }
            
            if (scannedEquipmentId) {
                // 점검 페이지로 이동 (장비 ID 전달)
                location.href = `inspection.html?equipmentId=${scannedEquipmentId}`;
            }
        }
        
        function goToHistory() {
            if (scannedEquipmentId) {
                // 정비내역 페이지로 이동 (장비 ID 전달)
                location.href = `equipment-history.html?equipment_id=${scannedEquipmentId}`;
            }
        }

        function resetScanner() {
            // UI 초기화
            document.getElementById('scannerResult').style.display = 'none';
            document.getElementById('scannerError').style.display = 'none';
            document.getElementById('equipmentPreview').style.display = 'none';
            
            scannedEquipmentId = null;
            scannedEquipment = null;
            
            // 스캐너 재시작
            startScanner();
        }

        // 페이지 이탈 시 스캐너 정리
        window.addEventListener('beforeunload', function() {
            if (html5QrCode) {
                html5QrCode.stop().catch(err => console.error(err));
            }
        });
    </script>
</body>
</html>
