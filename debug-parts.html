<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부속품 데이터 디버그</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .debug-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .success { background: #e8f5e9; color: #388E3C; }
        .error { background: #ffebee; color: #C62828; }
        .info { background: #e3f2fd; color: #1976D2; }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="debug-section">
        <h1>🔍 부속품 데이터 디버그</h1>
        <button onclick="checkData()" style="padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600;">
            <i class="fas fa-play"></i> Firebase 데이터 확인
        </button>
        <div id="results" style="margin-top: 20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCpTEePTOkEfSLRzyszq0dCCJmQEWJsBic",
            authDomain: "hvac-management-477fb.firebaseapp.com",
            projectId: "hvac-management-477fb",
            storageBucket: "hvac-management-477fb.firebasestorage.app",
            messagingSenderId: "312239966797",
            appId: "1:312239966797:web:b454d99fde9823207dea04"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // 페이지 로드 시 익명 로그인
        signInAnonymously(auth).catch(error => {
            console.error("익명 로그인 실패:", error);
        });
        
        window.checkData = async function() {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="status info"><i class="fas fa-spinner fa-spin"></i> Firebase에서 장비 데이터 확인 중...</div>';
            
            try {
                // 전체 장비 조회 (limit 제거)
                const equipmentQuery = collection(db, 'equipment');
                const snapshot = await getDocs(equipmentQuery);
                
                let html = '';
                let totalCount = 0;
                let withPartsCount = 0;
                
                if (snapshot.empty) {
                    html += '<div class="status error">❌ 장비 데이터가 없습니다.</div>';
                } else {
                    totalCount = snapshot.size;
                    
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const hasParts = data.parts && Array.isArray(data.parts) && data.parts.length > 0;
                        
                        if (hasParts) {
                            withPartsCount++;
                        }
                        
                        html += `
                            <div class="debug-section" style="border-left: 4px solid ${hasParts ? '#4CAF50' : '#ff9800'};">
                                <h3>${hasParts ? '✅' : '⚠️'} 장비 ID: ${doc.id}</h3>
                                <p><strong>장비 종류:</strong> ${data.equipment_type || '-'}</p>
                                <p><strong>모델:</strong> ${data.model || '-'}</p>
                                <p><strong>부속품 데이터 존재:</strong> ${hasParts ? '✅ 있음' : '❌ 없음'}</p>
                                ${hasParts ? `
                                    <div style="margin-top: 10px;">
                                        <strong>📦 부속품 목록 (${data.parts.length}개):</strong>
                                        <ul>
                                            ${data.parts.map(part => `
                                                <li><strong>${part.name}</strong>: ${part.spec}</li>
                                            `).join('')}
                                        </ul>
                                    </div>
                                ` : `
                                    <div class="status info" style="margin-top: 10px;">
                                        💡 이 장비에는 부속품이 등록되지 않았습니다.<br>
                                        시스템 관리 → 장비 관리에서 이 장비를 수정하여 부속품을 추가하세요.
                                    </div>
                                `}
                                <details style="margin-top: 10px;">
                                    <summary style="cursor: pointer; color: #667eea; font-weight: 600;">전체 데이터 보기 (JSON)</summary>
                                    <pre>${JSON.stringify(data, null, 2)}</pre>
                                </details>
                            </div>
                        `;
                    });
                    
                    // 요약
                    html = `
                        <div class="status ${withPartsCount > 0 ? 'success' : 'error'}">
                            <strong>📊 요약:</strong><br>
                            - 전체 장비: ${totalCount}개<br>
                            - 부속품 등록된 장비: ${withPartsCount}개<br>
                            - 부속품 없는 장비: ${totalCount - withPartsCount}개
                        </div>
                        ${html}
                        <div class="status info" style="margin-top: 20px;">
                            <strong>💡 부속품을 보려면:</strong><br>
                            1. 시스템 관리 → 장비 관리<br>
                            2. 장비 수정 버튼 클릭<br>
                            3. "부속품 정보" 섹션에서 "부속품 추가" 클릭<br>
                            4. 부속품명과 규격 입력 후 저장<br>
                            5. 점검 페이지에서 해당 장비 선택 → "장비 상세" 클릭<br>
                            6. 하단에 부속품 정보 카드 표시됨
                        </div>
                    `;
                }
                
                results.innerHTML = html;
                
            } catch (error) {
                results.innerHTML = `<div class="status error">❌ 오류: ${error.message}</div>`;
                console.error(error);
            }
        };
    </script>
</body>
</html>
