<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>점검 데이터 디버그</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .field { color: blue; }
        .value { color: green; }
    </style>
</head>
<body>
    <h1>점검 데이터 구조 확인</h1>
    <button onclick="loadData()">데이터 로드</button>
    <div id="result"></div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCpTEePTOkEfSLRzyszq0dCCJmQEWJsBic",
            authDomain: "hvac-management-477fb.firebaseapp.com",
            projectId: "hvac-management-477fb",
            storageBucket: "hvac-management-477fb.firebasestorage.app",
            messagingSenderId: "312239966797",
            appId: "1:312239966797:web:b454d99fde9823207dea04"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.loadData = async function() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>로딩 중...</p>';
            
            try {
                // 최근 5개 점검 데이터 가져오기
                const inspectionsRef = collection(db, 'inspections');
                const q = query(inspectionsRef, limit(5));
                const snapshot = await getDocs(q);
                
                const inspections = [];
                snapshot.forEach(doc => {
                    inspections.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                let html = '<h2>최근 5개 점검 데이터:</h2>';
                
                inspections.forEach((insp, index) => {
                    html += `<h3>점검 #${index + 1} (ID: ${insp.id})</h3>`;
                    html += '<pre>';
                    
                    // 모든 필드 표시
                    Object.keys(insp).forEach(key => {
                        const value = insp[key];
                        let displayValue;
                        
                        if (value && typeof value.toDate === 'function') {
                            displayValue = value.toDate().toISOString();
                        } else if (typeof value === 'object') {
                            displayValue = JSON.stringify(value);
                        } else {
                            displayValue = value;
                        }
                        
                        html += `<span class="field">${key}</span>: <span class="value">${displayValue}</span>\n`;
                    });
                    
                    html += '</pre>';
                    
                    // equipment_id 필드 체크
                    if (insp.equipment_id) {
                        html += `<p style="color: green;">✅ equipment_id 존재: <strong>${insp.equipment_id}</strong></p>`;
                    } else {
                        html += '<p style="color: red;">❌ equipment_id 없음!</p>';
                    }
                });
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: red;">오류: ' + error.message + '</p>';
                console.error('데이터 로드 오류:', error);
            }
        };
    </script>
</body>
</html>
