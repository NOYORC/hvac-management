<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - HVAC 관리</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .logo-section h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 5px;
        }

        .logo-section p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        input, select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            animation: shake 0.5s ease;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .loading-spinner {
            display: none;
            margin-left: 10px;
        }

        .loading-spinner.show {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }

        .info-box i {
            margin-right: 8px;
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 20px;
            }

            .logo-section h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-wind"></i>
            </div>
            <h1>회원가입</h1>
            <p>HVAC 관리 시스템</p>
        </div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            회원가입은 승인 후 사용 가능합니다.
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="email">이메일</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" required placeholder="example@hvac.com">
                </div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required placeholder="최소 6자 이상" minlength="6">
                </div>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">비밀번호 확인</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passwordConfirm" required placeholder="비밀번호를 다시 입력하세요">
                </div>
            </div>

            <div class="form-group">
                <label for="name">이름</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="name" required placeholder="홍길동">
                </div>
            </div>

            <div class="form-group">
                <label for="role">역할</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag"></i>
                    <select id="role" required>
                        <option value="">역할을 선택하세요</option>
                        <option value="inspector">점검자 (INSPECTOR)</option>
                        <option value="manager">매니저 (MANAGER)</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="signupBtn">
                <span>회원가입</span>
                <span class="loading-spinner"></span>
            </button>

            <div class="message" id="message"></div>
        </form>

        <div class="back-link">
            <a href="login.html">
                <i class="fas fa-arrow-left"></i> 로그인으로 돌아가기
            </a>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, deleteUser } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCpTEePTOkEfSLRzyszq0dCCJmQEWJsBic",
            authDomain: "hvac-management-477fb.firebaseapp.com",
            projectId: "hvac-management-477fb",
            storageBucket: "hvac-management-477fb.firebasestorage.app",
            messagingSenderId: "312239966797",
            appId: "1:312239966797:web:b454d99fde9823207dea04",
            measurementId: "G-FT4YE5FDP1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.auth = auth;
        window.db = db;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.deleteUser = deleteUser;
        window.doc = doc;
        window.setDoc = setDoc;
        window.serverTimestamp = serverTimestamp;
    </script>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const name = document.getElementById('name').value;
            const role = document.getElementById('role').value;
            
            const signupBtn = document.getElementById('signupBtn');
            const message = document.getElementById('message');
            
            // 비밀번호 확인
            if (password !== passwordConfirm) {
                showMessage('비밀번호가 일치하지 않습니다.', 'error');
                return;
            }
            
            // 로딩 시작
            signupBtn.disabled = true;
            signupBtn.querySelector('.loading-spinner').classList.add('show');
            
            let createdUser = null;
            
            try {
                // 1단계: Firebase Authentication에 사용자 생성
                console.log('🔐 1단계: Authentication 계정 생성 시작...');
                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                createdUser = userCredential.user;
                console.log('✅ Auth 계정 생성 완료:', createdUser.uid);
                
                // 2단계: Firestore에 사용자 정보 저장
                console.log('💾 2단계: Firestore users 컬렉션에 정보 저장 시도...');
                await window.setDoc(window.doc(window.db, 'users', createdUser.uid), {
                    email: email,
                    name: name,
                    role: role,
                    created_at: window.serverTimestamp(),
                    updated_at: window.serverTimestamp()
                });
                console.log('✅ Firestore 저장 완료');
                
                showMessage('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다...', 'success');
                
                // 2초 후 로그인 페이지로 이동
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error('❌ 회원가입 오류:', error);
                console.error('에러 코드:', error.code);
                console.error('에러 메시지:', error.message);
                
                let errorMessage = '회원가입에 실패했습니다.';
                
                // Firestore 권한 오류 처리
                if (error.code === 'permission-denied' || error.message.includes('Missing or insufficient permissions')) {
                    console.error('🔒 Firestore 권한 오류 발생!');
                    errorMessage = 'Firestore 권한 오류가 발생했습니다.\n\nFirebase Console에서 Security Rules를 확인해주세요.\n\n현재 상태: Auth 계정은 생성되었으나 사용자 정보 저장 실패';
                    
                    // 생성된 Auth 계정 삭제 시도
                    if (createdUser) {
                        try {
                            console.log('🗑️ 생성된 Auth 계정 롤백 시도...');
                            await window.deleteUser(createdUser);
                            console.log('✅ Auth 계정 삭제 완료');
                            errorMessage += '\n\n(생성된 Auth 계정은 자동 삭제되었습니다)';
                        } catch (deleteError) {
                            console.error('❌ Auth 계정 삭제 실패:', deleteError);
                            errorMessage += '\n\n⚠️ 주의: Auth 계정이 남아있을 수 있습니다. Firebase Console에서 수동 삭제가 필요합니다.';
                        }
                    }
                } else if (error.code === 'auth/email-already-in-use') {
                    errorMessage = '이미 사용 중인 이메일입니다.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = '올바른 이메일 형식이 아닙니다.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = '비밀번호는 최소 6자 이상이어야 합니다.';
                }
                
                showMessage(errorMessage, 'error');
                signupBtn.disabled = false;
                signupBtn.querySelector('.loading-spinner').classList.remove('show');
            }
        });
        
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
            
            if (type === 'error') {
                setTimeout(() => {
                    message.classList.remove('show');
                }, 5000);
            }
        }
    </script>
</body>
</html>
