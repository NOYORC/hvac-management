<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-wind"></i>
                <h1>HVAC 장비 관리</h1>
            </div>
            <p class="subtitle">공조설비 점검 및 관리 시스템</p>
            
            <!-- 사용자 정보 -->
            <div id="userInfo" class="user-info" style="display: none;">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-details">
                    <div class="user-name" id="userName">사용자</div>
                    <div class="user-role" id="userRole">역할</div>
                </div>
                <button onclick="logout()" class="btn-logout" title="로그아웃">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
        </div>

        <div class="main-menu">
            <div class="menu-card inspector-only" onclick="goToInspection()">
                <div class="card-icon inspector">
                    <i class="fas fa-clipboard-check"></i>
                </div>
                <h2>장비 점검</h2>
                <p>현장 장비 점검 및 데이터 입력</p>
                <div class="card-badge">점검자/시스템관리자</div>
            </div>

            <div class="menu-card" onclick="goToDashboard()">
                <div class="card-icon manager">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h2>관리 대시보드</h2>
                <p>통계, 차트 및 점검 내역 조회</p>
                <div class="card-badge">조회자/점검자/관리자</div>
            </div>
            

            <div class="menu-card admin-only" onclick="goToAdmin()" style="display: none;">
                <div class="card-icon admin">
                    <i class="fas fa-cog"></i>
                </div>
                <h2>시스템 관리</h2>
                <p>사용자 승인 및 시스템 설정</p>
                <div class="card-badge">시스템 관리자</div>
            </div>
        </div>

        <div class="quick-access">
            <h3><i class="fas fa-bolt"></i> 빠른 접근</h3>
            <div class="quick-buttons">
                <button onclick="openQRScanner()" class="btn-qr inspector-only">
                    <i class="fas fa-qrcode"></i>
                    <span>QR 스캔</span>
                </button>
                <button onclick="location.href='equipment-search.html'" class="btn-search">
                    <i class="fas fa-search"></i>
                    <span>장비 검색</span>
                </button>
            </div>
        </div>

        <div class="footer">
            <p> HVAC Equipment Management System </p>
            <p> © 2025 Dongjin Air Tech. All rights reserved.</p>
        </div>
    </div>

    <!-- 비밀번호 입력 팝업 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-lock"></i>
                <h3 id="modalTitle">비밀번호 입력</h3>
            </div>
            <div class="modal-body">
                <p id="modalDescription">접근하려면 비밀번호를 입력해주세요</p>
                <input type="password" id="passwordInput" placeholder="비밀번호 입력" maxlength="20">
                <div class="password-hint" id="passwordHint"></div>
            </div>
            <div class="modal-footer">
                <button onclick="closePasswordModal()" class="btn-cancel">
                    <i class="fas fa-times"></i> 취소
                </button>
                <button onclick="submitPassword()" class="btn-submit">
                    <i class="fas fa-check"></i> 확인
                </button>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth-manager.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker 등록 성공:', registration.scope);
                        
                        // 업데이트 확인
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('🔄 새로운 Service Worker 발견');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // 새 버전이 설치됨 - 사용자에게 알림
                                    console.log('🆕 새 버전이 준비되었습니다. 새로고침하세요.');
                                    // 선택사항: 사용자에게 알림 표시
                                    if (confirm('새 버전이 준비되었습니다. 지금 새로고침하시겠습니까?')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.error('❌ Service Worker 등록 실패:', error);
                    });
            });
            
            // Service Worker 제어 변경 감지
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('🔄 Service Worker 제어가 변경되었습니다.');
            });
        } else {
            console.warn('⚠️ 이 브라우저는 Service Worker를 지원하지 않습니다.');
        }
        
        // 설치 프롬프트 처리
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('📱 PWA 설치 프롬프트 준비');
            e.preventDefault();
            deferredPrompt = e;
            
            // 설치 버튼 표시 (선택사항)
            // showInstallButton();
        });
        
        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA가 설치되었습니다!');
            deferredPrompt = null;
        });
        
        // 온라인/오프라인 상태 감지
        window.addEventListener('online', () => {
            console.log('🌐 온라인 상태로 전환');
            // 선택사항: 사용자에게 알림
        });
        
        window.addEventListener('offline', () => {
            console.log('📴 오프라인 상태로 전환');
            // 선택사항: 사용자에게 알림
        });
    </script>
</body>
