<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리 대시보드 - HVAC 관리</title>    
    <!-- PWA Meta Tags -->
    <meta name="description" content="공조설비 점검 및 관리 시스템">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HVAC 관리">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="btn-back" onclick="location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1><i class="fas fa-chart-line"></i> 관리 대시보드</h1>
        </div>

        <!-- 브레드크럼 네비게이션 -->
        <nav class="breadcrumb">
            <div class="breadcrumb-item">
                <a href="index.html">
                    <i class="fas fa-home"></i>
                    홈
                </a>
            </div>
            <span class="breadcrumb-separator">
                <i class="fas fa-chevron-right"></i>
            </span>
            <div class="breadcrumb-item">
                <span class="breadcrumb-current">
                    <i class="fas fa-chart-line"></i>
                    관리 대시보드
                </span>
            </div>
        </nav>

        <!-- 필터 패널 -->
        <div class="filter-panel">
            <div class="filter-group">
                <label><i class="fas fa-calendar"></i> 기간</label>
                <select id="periodFilter">
                    <option value="today">오늘</option>
                    <option value="week">최근 7일</option>
                    <option value="month">최근 30일</option>
                    <option value="all" selected>전체</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-building"></i> 현장</label>
                <select id="siteFilterDash">
                    <option value="">전체</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-info-circle"></i> 상태</label>
                <select id="statusFilter">
                    <option value="">전체</option>
                    <option value="정상">정상</option>
                    <option value="주의">주의</option>
                    <option value="고장">고장</option>
                </select>
            </div>
        </div>
        
        <!-- 액션 버튼 패널 -->
        <div class="action-panel">
            <button id="refreshBtn" class="btn-refresh" onclick="refreshDashboard()" title="최신 데이터로 새로고침">
                <i class="fas fa-sync-alt"></i> 새로고침
            </button>
            <button id="downloadBtn" class="btn-download" onclick="downloadExcel()">
                <i class="fas fa-download"></i> 엑셀 다운로드
            </button>
        </div>

        <!-- 통계 카드 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <i class="fas fa-clipboard-check"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">총 점검</div>
                    <div class="stat-value" id="totalInspections">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">정상</div>
                    <div class="stat-value" id="normalCount">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #FF9800 0%, #FFC107 100%);">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">주의</div>
                    <div class="stat-value" id="warningCount">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #F44336 0%, #E91E63 100%);">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">고장</div>
                    <div class="stat-value" id="failureCount">0</div>
                </div>
            </div>
        </div>

        <!-- 차트 영역 -->
        <div class="charts-grid" style="grid-template-columns: 1fr;">
            <div class="chart-card">
                <h3><i class="fas fa-chart-bar"></i> 장비 상태 분포</h3>
                <div class="chart-wrapper">
                    <canvas id="statusChart"></canvas>
                </div>
                <!-- 차트 요약 통계 -->
                <div class="chart-summary" id="chartSummary">
                    <!-- 동적으로 생성 -->
                </div>
            </div>
        </div>

        <!-- 이상 장비 목록 -->
        <div class="alert-section">
            <div class="section-header">
                <h2><i class="fas fa-exclamation-circle"></i> 주의가 필요한 장비</h2>
            </div>
            
            <!-- 데스크톱: 테이블 -->
            <div class="table-container">
                <table id="alertInspections">
                    <thead>
                        <tr>
                            <th>점검일시</th>
                            <th>점검자</th>
                            <th>장비</th>
                            <th>위치</th>
                            <th>상태</th>
                            <th>특이사항</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 동적으로 생성 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 모바일: 카드 -->
            <div class="inspection-cards" id="alertCards">
                <!-- 동적으로 생성 -->
            </div>
            
            <!-- 더보기 버튼 (리스트 하단) -->
            <div class="show-more-container" id="alertShowMoreContainer" style="display: none;">
                <button id="alertShowMoreBtn" class="btn-show-more">
                    <span class="btn-text">내역 더보기</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
        </div>

        <!-- 최근 점검 내역 -->
        <div class="recent-section">
            <div class="section-header">
                <h2><i class="fas fa-history"></i> 최근 점검 내역</h2>
            </div>
            
            <!-- 데스크톱: 테이블 -->
            <div class="table-container">
                <table id="recentInspections">
                    <thead>
                        <tr>
                            <th>점검일시</th>
                            <th>점검자</th>
                            <th>장비</th>
                            <th>위치</th>
                            <th>상태</th>
                            <th>특이사항</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 동적으로 생성 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 모바일: 카드 -->
            <div class="inspection-cards" id="inspectionCards">
                <!-- 동적으로 생성 -->
            </div>
            
            <!-- 더보기 버튼 (리스트 하단) -->
            <div class="show-more-container" id="recentShowMoreContainer" style="display: none;">
                <button id="recentShowMoreBtn" class="btn-show-more">
                    <span class="btn-text">내역 더보기</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
                const firebaseConfig = {
            apiKey: "AIzaSyCpTEePTOkEfSLRzyszq0dCCJmQEWJsBic",
            authDomain: "hvac-management-477fb.firebaseapp.com",
            projectId: "hvac-management-477fb",
            storageBucket: "hvac-management-477fb.firebasestorage.app",
            messagingSenderId: "312239966797",
            appId: "1:312239966797:web:b454d99fde9823207dea04",
            measurementId: "G-FT4YE5FDP1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.FirestoreTimestamp = Timestamp; // Timestamp를 전역으로 export
    </script>
    
    <!-- SheetJS 라이브러리 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/cache-helper.js"></script>
    <script src="js/auth-manager.js"></script>
    <script src="js/auth-check.js"></script>
    <script src="js/mobile-utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
